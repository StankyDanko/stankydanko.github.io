<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#0A0710"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#10B981" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="25%" stop-color="#10B981" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#10B981" stop-opacity="1"/>
      <stop offset="75%" stop-color="#10B981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Eye shape -->
  <g transform="translate(600, 270)">
    <!-- Outer eye outline -->
    <path d="M -180 0 Q -90 -100 0 -100 Q 90 -100 180 0 Q 90 100 0 100 Q -90 100 -180 0 Z"
          stroke="#10B981" stroke-width="2.5" fill="none"/>

    <!-- Inner eye fill (very subtle) -->
    <path d="M -170 0 Q -85 -92 0 -92 Q 85 -92 170 0 Q 85 92 0 92 Q -85 92 -170 0 Z"
          fill="#10B981" fill-opacity="0.04"/>

    <!-- Iris ring -->
    <circle cx="0" cy="0" r="58" stroke="#10B981" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="0" r="55" stroke="#10B981" stroke-width="0.5" stroke-opacity="0.4" fill="#10B981" fill-opacity="0.08"/>

    <!-- Pupil -->
    <circle cx="0" cy="0" r="28" fill="#10B981" fill-opacity="0.25" stroke="#10B981" stroke-width="1"/>

    <!-- Pupil core -->
    <circle cx="0" cy="0" r="12" fill="#10B981" fill-opacity="0.9"/>

    <!-- Catchlight -->
    <circle cx="14" cy="-14" r="5" fill="#ffffff" fill-opacity="0.7"/>
    <circle cx="-8" cy="8" r="2.5" fill="#ffffff" fill-opacity="0.3"/>

    <!-- Scan lines through eye -->
    <line x1="-230" y1="-40" x2="230" y2="-40" stroke="#10B981" stroke-opacity="0.12" stroke-width="0.5"/>
    <line x1="-230" y1="-20" x2="230" y2="-20" stroke="#10B981" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="-230" y1="0" x2="230" y2="0" stroke="#10B981" stroke-opacity="0.15" stroke-width="0.5"/>
    <line x1="-230" y1="20" x2="230" y2="20" stroke="#10B981" stroke-opacity="0.08" stroke-width="0.5"/>
    <line x1="-230" y1="40" x2="230" y2="40" stroke="#10B981" stroke-opacity="0.12" stroke-width="0.5"/>

    <!-- Corner brackets (tech/HUD feel) -->
    <path d="M -195 -50 L -195 -70 L -175 -70" stroke="#10B981" stroke-opacity="0.3" stroke-width="1" fill="none"/>
    <path d="M 195 -50 L 195 -70 L 175 -70" stroke="#10B981" stroke-opacity="0.3" stroke-width="1" fill="none"/>
    <path d="M -195 50 L -195 70 L -175 70" stroke="#10B981" stroke-opacity="0.3" stroke-width="1" fill="none"/>
    <path d="M 195 50 L 195 70 L 175 70" stroke="#10B981" stroke-opacity="0.3" stroke-width="1" fill="none"/>
  </g>

  <!-- Audio waveform beneath eye -->
  <g transform="translate(600, 440)">
    <path d="M -280 0 l 14 -5 l 14 10 l 14 -8 l 14 14 l 14 -20 l 14 26 l 14 -32 l 14 38 l 14 -44 l 14 40 l 14 -34 l 14 28 l 14 -20 l 14 16 l 14 -12 l 14 8 l 14 -5 l 14 10 l 14 -8 l 14 14 l 14 -20 l 14 26 l 14 -32 l 14 38 l 14 -44 l 14 40 l 14 -34 l 14 28 l 14 -20 l 14 16 l 14 -12 l 14 8 l 14 -5 l 14 3 l 14 -6 l 14 4 l 14 -3 l 14 2 l 14 -1"
          stroke="url(#wave-grad)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Tagline -->
  <text x="600" y="520" text-anchor="middle" font-family="monospace" font-size="11" letter-spacing="6" fill="#10B981" fill-opacity="0.2">SAY WHAT YOU SEE</text>
</svg>
